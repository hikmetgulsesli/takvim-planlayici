<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Be+Vietnam+Pro:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#131315",
              "on-tertiary-fixed": "#3f0018",
              "on-primary-fixed": "#001f27",
              "surface-dim": "#131315",
              "on-primary-container": "#00586b",
              "tertiary-fixed-dim": "#ffb1c2",
              "surface-tint": "#3cd7ff",
              "on-tertiary": "#66002b",
              "error-container": "#93000a",
              "surface-container-highest": "#353437",
              "secondary-fixed": "#f3daff",
              "outline": "#859398",
              "secondary-fixed-dim": "#e2b6ff",
              "surface-bright": "#39393b",
              "tertiary": "#ffd4dc",
              "primary-fixed-dim": "#3cd7ff",
              "on-primary": "#003642",
              "on-secondary-fixed": "#2f004d",
              "error": "#ffb4ab",
              "on-secondary-fixed-variant": "#6e00ab",
              "primary": "#a8e8ff",
              "surface": "#131315",
              "surface-variant": "#353437",
              "on-surface": "#e5e1e4",
              "secondary": "#e2b6ff",
              "tertiary-fixed": "#ffd9e0",
              "surface-container-lowest": "#0e0e10",
              "surface-container-low": "#1c1b1d",
              "on-tertiary-fixed-variant": "#8f0040",
              "on-secondary-container": "#e9c3ff",
              "inverse-primary": "#00677e",
              "tertiary-container": "#ffacbe",
              "on-surface-variant": "#bbc9cf",
              "secondary-container": "#8900d5",
              "outline-variant": "#3c494e",
              "on-error-container": "#ffdad6",
              "on-error": "#690005",
              "surface-container-high": "#2a2a2c",
              "surface-container": "#201f21",
              "primary-container": "#00d4ff",
              "on-primary-fixed-variant": "#004e5f",
              "inverse-on-surface": "#313032",
              "primary-fixed": "#b4ebff",
              "on-background": "#e5e1e4",
              "on-tertiary-container": "#a10048",
              "inverse-surface": "#e5e1e4",
              "on-secondary": "#4d007a"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Be Vietnam Pro"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin-slow 1.5s linear infinite;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-[#131315] no-border bg-[#1c1b1d] flat no shadows">
<div class="text-2xl font-bold tracking-tighter text-[#00d4ff] font-['Space_Grotesk'] tracking-tighter">
            Sonic Pulse
        </div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-[#e5e1e4]/60 hover:text-[#00d4ff] transition-colors duration-300 cursor-pointer">settings</span>
<span class="material-symbols-outlined text-[#e5e1e4]/60 hover:text-[#00d4ff] transition-colors duration-300 cursor-pointer">account_circle</span>
</div>
</header>
<main class="relative h-screen flex flex-col items-center justify-center p-6 pb-32">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary-container/5 via-transparent to-transparent pointer-events-none"></div>
<div class="relative z-10 flex flex-col items-center max-w-md w-full">
<div class="w-64 h-64 md:w-80 md:h-80 rounded-xl bg-gradient-to-br from-surface-container-high via-primary-container/20 to-surface-container-low flex items-center justify-center shadow-[0_0_50px_-12px_rgba(0,212,255,0.3)] mb-12 overflow-hidden border border-outline-variant/10">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10"></div>
<span class="material-symbols-outlined text-8xl text-primary-container drop-shadow-[0_0_15px_rgba(0,212,255,0.6)]" style="font-variation-settings: 'FILL' 1;">music_note</span>
</div>
<div class="flex flex-col items-center gap-6">
<div class="relative w-12 h-12">
<div class="absolute inset-0 rounded-full border-4 border-primary-container/10"></div>
<div class="absolute inset-0 rounded-full border-4 border-transparent border-t-primary-container animate-spin-custom shadow-[0_0_15px_rgba(0,212,255,0.4)]"></div>
</div>
<div class="text-center space-y-2">
<h1 class="text-3xl md:text-4xl font-headline font-bold tracking-tighter text-on-surface">
                        Şarkı yükleniyor...
                    </h1>
<p class="text-on-surface-variant/60 font-body tracking-wide">
                        Lütfen bekleyin
                    </p>
</div>
</div>
</div>
</main>
<footer class="fixed bottom-0 w-full z-50 flex flex-col bg-[#1c1b1d]/80 backdrop-blur-xl no-border shadow-[0_-1px_0_0_rgba(255,255,255,0.05)] shadow-2xl">
<div class="px-6 pt-4 pb-2 opacity-30 pointer-events-none">
<div class="flex items-center justify-between text-[10px] font-label uppercase tracking-[0.2em] text-on-surface-variant mb-2">
<span>0:00</span>
<span>--:--</span>
</div>
<div class="h-1 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full w-0 bg-primary-container"></div>
</div>
</div>
<nav class="flex justify-around items-center px-6 pb-6 pt-2 opacity-40 pointer-events-none">
<div class="flex flex-col items-center justify-center text-[#00d4ff] drop-shadow-[0_0_8px_rgba(0,212,255,0.5)] font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-widest">
<span class="material-symbols-outlined mb-1">home</span>
<span>Home</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e5e1e4]/40 font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-widest">
<span class="material-symbols-outlined mb-1">explore</span>
<span>Explore</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e5e1e4]/40 font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-widest">
<span class="material-symbols-outlined mb-1">library_music</span>
<span>Library</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e5e1e4]/40 font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-widest">
<span class="material-symbols-outlined mb-1">equalizer</span>
<span>Now Playing</span>
</div>
</nav>
</footer>
</body></html>
