<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Şimdi Çalınıyor - Neon Kineticism</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-lowest": "#0e0e10",
                        "on-secondary": "#4d007a",
                        "on-background": "#e5e1e4",
                        "tertiary": "#ffd4dc",
                        "surface": "#131315",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#3f0018",
                        "on-tertiary": "#66002b",
                        "on-surface-variant": "#bbc9cf",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#201f21",
                        "primary-container": "#00d4ff",
                        "on-primary": "#003642",
                        "tertiary-fixed": "#ffd9e0",
                        "tertiary-container": "#ffacbe",
                        "primary-fixed-dim": "#3cd7ff",
                        "surface-dim": "#131315",
                        "surface-container-highest": "#353437",
                        "surface-container-high": "#2a2a2c",
                        "inverse-on-surface": "#313032",
                        "outline": "#859398",
                        "secondary": "#e2b6ff",
                        "on-secondary-container": "#e9c3ff",
                        "on-primary-fixed-variant": "#004e5f",
                        "on-primary-fixed": "#001f27",
                        "inverse-surface": "#e5e1e4",
                        "on-primary-container": "#00586b",
                        "on-surface": "#e5e1e4",
                        "on-tertiary-container": "#a10048",
                        "surface-container-low": "#1c1b1d",
                        "primary-fixed": "#b4ebff",
                        "outline-variant": "#3c494e",
                        "tertiary-fixed-dim": "#ffb1c2",
                        "background": "#131315",
                        "on-tertiary-fixed-variant": "#8f0040",
                        "on-secondary-fixed-variant": "#6e00ab",
                        "secondary-container": "#8900d5",
                        "primary": "#a8e8ff",
                        "surface-variant": "#353437",
                        "surface-bright": "#39393b",
                        "secondary-fixed": "#f3daff",
                        "surface-tint": "#3cd7ff",
                        "inverse-primary": "#00677e",
                        "secondary-fixed-dim": "#e2b6ff",
                        "on-error": "#690005",
                        "on-secondary-fixed": "#2f004d"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neon-glow-primary {
            box-shadow: 0 0 40px -5px rgba(0, 212, 255, 0.4);
        }
        .text-glow-white {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        .light-leak {
            background: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Light Leaks -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-1/4 -left-1/4 w-[80vw] h-[80vw] light-leak opacity-40 blur-[100px]"></div>
<div class="absolute -bottom-1/4 -right-1/4 w-[70vw] h-[70vw] light-leak opacity-30 blur-[120px]"></div>
</div>
<!-- Main Player Overlay -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-between px-6 py-8 md:py-12 max-w-4xl mx-auto">
<!-- Header: TopAppBar Mapping -->
<header class="flex justify-between items-center w-full px-6 py-4 fixed top-0 left-0 bg-transparent z-50">
<div class="flex-1"></div>
<div class="flex-1 flex justify-center">
<span class="font-['Space_Grotesk'] tracking-tighter uppercase text-sm text-[#00d4ff]">
                    ŞİMDİ ÇALINIYOR
                </span>
</div>
<div class="flex-1 flex justify-end">
<button class="hover:text-[#00d4ff] transition-colors duration-200 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl text-[#e5e1e4]">close</span>
</button>
</div>
</header>
<!-- Album Art Section -->
<section class="flex-1 flex flex-col items-center justify-center w-full mt-16 md:mt-24 mb-8">
<div class="relative group">
<!-- Large Centered Album Art with Heavy Neon Glow -->
<div class="w-64 h-64 md:w-96 md:h-96 rounded-xl overflow-hidden neon-glow-primary border border-outline-variant/15 transition-transform duration-700 group-hover:scale-[1.02]">
<img alt="Album Art" class="w-full h-full object-cover" data-alt="Abstract vibrant synthwave artwork with neon geometric shapes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCv7O_-FQgfGTQ94VZiTvMt8AacrksUoOeJMfdzR4fJBLzSDsmx2aQgH8Ccz-F4tTSFmKFnd4GpYHKJqkHsT_t1GO6cHvcn_MwjOCTkCNfg79PODviUWG9vsVSMUksLWUYl43gQje1Fy0_0LCf_PWP8s2Aupion6ybE7cEiOX--Ak8B_Kqo9XTHHecSK4L5eV1z_HbpYQJ0W_hWYOuKkX4EIUtriralBak53N9s8neTu-eoYUwrQp1r4aHfT_qxA37HpX_wpcJlsBw"/>
</div>
</div>
<!-- Song Info -->
<div class="mt-10 text-center">
<h1 class="font-headline font-bold text-4xl md:text-6xl text-on-surface text-glow-white tracking-tight mb-2">
                    Kozmik Gece
                </h1>
<p class="font-body text-primary/70 text-lg md:text-xl font-medium tracking-wide">
                    Yıldız Tozu Kolektifi
                </p>
</div>
<!-- Equalizer Visualization (5-band Vertical) -->
<div class="flex items-end justify-center gap-2 h-16 mt-8">
<!-- Red -->
<div class="w-1.5 bg-error-container rounded-full h-1/2 opacity-80 shadow-[0_0_10px_rgba(255,0,0,0.3)]"></div>
<!-- Orange -->
<div class="w-1.5 bg-secondary-container rounded-full h-3/4 opacity-80 shadow-[0_0_10px_rgba(137,0,213,0.3)]"></div>
<!-- Yellow -->
<div class="w-1.5 bg-tertiary-container rounded-full h-full opacity-80 shadow-[0_0_10px_rgba(255,212,220,0.3)]"></div>
<!-- Green -->
<div class="w-1.5 bg-on-tertiary-container rounded-full h-2/3 opacity-80 shadow-[0_0_10px_rgba(161,0,72,0.3)]"></div>
<!-- Blue -->
<div class="w-1.5 bg-primary-container rounded-full h-1/2 opacity-80 shadow-[0_0_10px_rgba(0,212,255,0.3)]"></div>
</div>
</section>
<!-- Playback Controls Section -->
<section class="w-full space-y-8 md:space-y-12 mb-20 md:mb-12">
<!-- Progress Bar -->
<div class="w-full space-y-2">
<div class="relative h-1.5 w-full bg-surface-variant/30 rounded-full overflow-hidden group cursor-pointer">
<div class="absolute top-0 left-0 h-full w-[40%] bg-gradient-to-r from-primary to-secondary rounded-full shadow-[0_0_12px_rgba(0,212,255,0.4)]"></div>
<div class="absolute top-1/2 -translate-y-1/2 left-[40%] w-3 h-3 bg-on-primary rounded-full border-2 border-primary shadow-[0_0_10px_rgba(0,212,255,0.8)] opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
<div class="flex justify-between text-[10px] font-label text-on-surface-variant font-medium tracking-widest uppercase">
<span>1:24</span>
<span>5:30</span>
</div>
</div>
<!-- Core Controls -->
<div class="flex items-center justify-between max-w-sm mx-auto">
<button class="text-on-surface-variant hover:text-tertiary transition-all duration-300">
<span class="material-symbols-outlined text-2xl">shuffle</span>
</button>
<div class="flex items-center gap-8 md:gap-12">
<button class="text-on-surface hover:text-primary transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined text-3xl">skip_previous</span>
</button>
<!-- Large Play/Pause Button -->
<button class="w-20 h-20 rounded-full bg-gradient-to-br from-secondary to-secondary-container flex items-center justify-center text-on-secondary shadow-[0_0_25px_rgba(137,0,213,0.4)] hover:shadow-[0_0_35px_rgba(137,0,213,0.6)] transition-all duration-500 hover:scale-105 active:scale-95 group">
<span class="material-symbols-outlined text-4xl leading-none" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface hover:text-primary transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined text-3xl">skip_next</span>
</button>
</div>
<button class="text-on-surface-variant hover:text-tertiary transition-all duration-300">
<span class="material-symbols-outlined text-2xl">repeat</span>
</button>
</div>
<!-- Volume Control -->
<div class="flex items-center gap-4 max-w-xs mx-auto">
<span class="material-symbols-outlined text-on-surface-variant text-sm">volume_down</span>
<div class="flex-1 h-1 bg-surface-variant/30 rounded-full relative cursor-pointer group">
<div class="absolute top-0 left-0 h-full w-[70%] bg-primary/50 rounded-full group-hover:bg-primary transition-colors"></div>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-sm">volume_up</span>
</div>
</section>
<!-- Bottom Navigation Shell Mapping -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#131315]/80 backdrop-blur-xl shadow-[0_-10px_30px_rgba(0,212,255,0.1)] md:hidden">
<a class="flex flex-col items-center justify-center text-[#00d4ff] drop-shadow-[0_0_8px_rgba(0,212,255,0.5)]" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">Ana Sayfa</span>
</a>
<a class="flex flex-col items-center justify-center text-[#a8e8ff]/40 hover:text-[#00d4ff] transition-all" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">Keşfet</span>
</a>
<a class="flex flex-col items-center justify-center text-[#a8e8ff]/40 hover:text-[#00d4ff] transition-all" href="#">
<span class="material-symbols-outlined">library_music</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">Kitaplık</span>
</a>
<a class="flex flex-col items-center justify-center text-[#a8e8ff]/40 hover:text-[#00d4ff] transition-all" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">Ara</span>
</a>
<a class="flex flex-col items-center justify-center text-[#a8e8ff]/40 hover:text-[#00d4ff] transition-all" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">Ayarlar</span>
</a>
</nav>
</main>
</body></html>
