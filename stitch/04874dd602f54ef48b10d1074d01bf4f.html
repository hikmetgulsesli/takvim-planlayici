<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-tertiary/10 blur-[128px] rounded-full"></div>

<div class="relative z-10 flex flex-col items-center text-center max-w-2xl">

<div class="mb-12">
<h1 class="font-headline font-extrabold text-2xl text-primary tracking-tighter">Chronos Editorial</h1>
</div>
<!-- Main Error Display -->
<div class="relative">
<span class="font-headline font-extrabold text-[12rem] md:text-[18rem] leading-none text-surface-bright/20 select-none tracking-tighter">404</span>
<div class="absolute inset-0 flex items-center justify-center">
<div class="glass-card p-12 rounded-[2rem] shadow-[0_32px_64px_rgba(99,102,241,0.12)] border border-outline-variant/15">
<h2 class="font-headline font-bold text-3xl md:text-4xl text-on-surface mb-4">Aradığınız sayfa bulunamadı</h2>
<p class="font-body text-on-surface-variant text-lg max-w-md mx-auto leading-relaxed">
                            Zaman çizelgesinde bir sapma yaşandı. İstediğiniz sayfa arşivlerde yok veya taşınmış olabilir.
                        </p>
</div>
</div>
</div>
<!-- Actions Cluster -->
<div class="mt-16 flex flex-col sm:flex-row gap-6 items-center">
<!-- Primary Action -->
<a class="group relative inline-flex items-center gap-3 bg-gradient-to-br from-primary to-primary-container px-10 py-4 rounded-xl text-on-primary-fixed-variant font-bold text-base shadow-[0_8px_24px_rgba(128,131,255,0.3)] transition-all hover:scale-[1.02] active:scale-[0.98]" href="#">
<span class="material-symbols-outlined">calendar_today</span>
                    Takvime Dön

<!-- Secondary Action -->
<button class="flex items-center gap-2 text-primary font-semibold hover:text-on-primary-container transition-colors group" onclick="history.back()">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Geri Git
                </button>
</div>
</div>

<div class="absolute bottom-12 left-12 hidden lg:block">
<div class="flex flex-col gap-1 border-l-2 border-primary/30 pl-4">
<span class="font-label text-primary uppercase text-[10px] tracking-widest">Durum Kodu</span>
<span class="font-headline font-bold text-on-surface">ERROR_NOT_FOUND_04</span>
</div>
</div>
<div class="absolute bottom-12 right-12 hidden lg:block">
<div class="flex flex-col gap-1 items-end border-r-2 border-tertiary/30 pr-4 text-right">
<span class="font-label text-tertiary uppercase text-[10px] tracking-widest">Yerel Zaman</span>
<span class="font-headline font-bold text-on-surface" id="current-time">12:45 GMT+3</span>
</div>

<footer class="fixed bottom-8 w-full text-center px-4 md:px-0">
